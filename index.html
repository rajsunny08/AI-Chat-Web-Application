<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuralChat — AI Assistant</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app-shell">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">◈</span>
          <span class="logo-text">NeuralChat</span>
        </div>
        <button class="new-chat-btn" id="newChatBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Chat
        </button>
      </div>

      <div class="chat-history" id="chatHistory">
        <p class="history-label">Conversations</p>
        <div id="historyList"></div>
      </div>

      <div class="sidebar-footer">
        <div class="model-selector">
          <label>Model</label>
          <select id="modelSelect">
            <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
            <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
          </select>
        </div>
        <div class="api-key-section">
          <label>Anthropic API Key</label>
          <div class="key-input-wrap">
            <input type="password" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off" />
            <button id="saveKeyBtn" class="save-key-btn">Save</button>
          </div>
          <span class="key-status" id="keyStatus"></span>
        </div>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="chat-area">
      <header class="chat-header">
        <button class="sidebar-toggle" id="sidebarToggle">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="chat-title" id="chatTitle">New Conversation</span>
        <button class="clear-btn" id="clearBtn" title="Clear chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </header>

      <div class="messages-container" id="messagesContainer">
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-icon">◈</div>
          <h1>NeuralChat</h1>
          <p>Your intelligent AI assistant. Start a conversation below.</p>
          <div class="suggestions">
            <button class="suggestion-chip" data-text="Explain quantum computing in simple terms">Explain quantum computing</button>
            <button class="suggestion-chip" data-text="Write a Python function to sort a list of dictionaries by a key">Write a Python function</button>
            <button class="suggestion-chip" data-text="What are the best practices for REST API design?">REST API best practices</button>
            <button class="suggestion-chip" data-text="Summarize the key ideas of stoic philosophy">Stoic philosophy</button>
          </div>
        </div>
        <div id="messagesList"></div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="messageInput" placeholder="Message NeuralChat…" rows="1" maxlength="10000"></textarea>
          <button class="send-btn" id="sendBtn" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <p class="input-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</p>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
